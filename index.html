<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tyler Rolfe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root{
    --paper: #F6F4EF;
    --paper-dim: #EAE7DD;
    --ink: #20231F;
    --ink-soft: #4A4F47;
    --muted: #8A8578;
    --accent: #6B2737;
    --hairline: #D8D3C7;

    --font-display: 'Newsreader', Georgia, serif;
    --font-utility: 'IBM Plex Sans', Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
  }

  body {
    font-family: var(--font-display);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  a {
    color: var(--accent);
    text-decoration: none;
  }

  /* ---------- Page frame ---------- */

  .page {
    width: 100%;
    max-width: 640px;
    padding: 4.5rem 1.75rem 3rem;
  }

  /* ---------- Tabs (the signature element) ---------- */

  .tabset {
    display: flex;
    gap: 0.4rem;
    margin: 0 0 -1px;
    padding-left: 0.25rem;
  }

  .tab {
    font-family: var(--font-utility);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--paper-dim);
    border: 1px solid var(--hairline);
    border-bottom: none;
    border-radius: 5px 5px 0 0;
    padding: 0.65rem 1.15rem 0.55rem;
    transition: color 0.15s ease, background 0.15s ease;
  }

  .tab.is-active {
    color: var(--ink);
    background: var(--paper);
    border-bottom: 1px solid var(--paper);
    position: relative;
    z-index: 2;
  }

  .tab:not(.is-active):hover {
    color: var(--ink-soft);
  }

  .tab:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .tab .arrow {
    margin-left: 0.3rem;
    font-family: var(--font-utility);
  }

  .baseline {
    border-bottom: 1px solid var(--hairline);
    position: relative;
    z-index: 1;
  }

  /* ---------- Document body ---------- */

  .sheet {
    border: 1px solid var(--hairline);
    border-top: none;
    background: var(--paper);
    padding: 3rem 2.5rem 3.25rem;
  }

  .eyebrow {
    font-family: var(--font-utility);
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 0.9rem;
  }

  h1 {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(2.1rem, 5vw, 2.85rem);
    line-height: 1.1;
    margin: 0 0 1.4rem;
    color: var(--ink);
  }

  .rule {
    width: 48px;
    height: 2px;
    background: var(--accent);
    margin: 0 0 1.6rem;
    border: none;
  }

  .bio {
    font-size: 1.08rem;
    color: var(--ink-soft);
    max-width: 34rem;
  }

  .bio em {
    font-style: italic;
    color: var(--ink);
  }

  /* ---------- Footer ---------- */

  footer {
    font-family: var(--font-utility);
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-top: 2.25rem;
    text-align: center;
  }

  @media (max-width: 480px) {
    .page { padding: 3rem 1.1rem 2.5rem; }
    .sheet { padding: 2.25rem 1.5rem 2.5rem; }
    .tab { padding: 0.6rem 0.85rem 0.5rem; font-size: 0.66rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    .tab { transition: none; }
  }

</style>
</head>
<body>

  <main class="page">

    <!-- ===== Tabs: Home (this page) / CV (links to your PDF) ===== -->
    <nav class="tabset">
      <a class="tab is-active" href="index.html" aria-current="page">Home</a>
      <!-- EDIT: change "cv.pdf" to match the filename you upload to the repo -->
      <a class="tab" href="cv.pdf" target="_blank" rel="noopener">CV<span class="arrow">&#8599;</span></a>
    </nav>
    <div class="baseline"></div>

    <article class="sheet">

      <!-- EDIT: replace with your name -->
      <h1>JTyler Rolfe</h1>

      <hr class="rule">

      <!-- EDIT: replace this paragraph with your own bio -->
      <p class="bio">
        Machine learning researcher with interests in probabilistic modelling, generative AI, and scientific machine learning.
        
    </article>

    <footer>&copy; 2026 Tyler Rolfe</footer>

  </main>

</body>
</html>
